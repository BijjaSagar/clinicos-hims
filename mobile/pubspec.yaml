name: clinicos
description: ClinicOS — Specialty-First EMR for Indian Clinics
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Camera & Photos
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  photo_view: ^0.14.0

  # Audio (for AI dictation)
  record: ^5.0.4
  audioplayers: ^6.0.0

  # PDF
  printing: ^5.13.1
  pdf: ^3.10.8

  # WhatsApp deep link
  url_launcher: ^6.2.6

  # Razorpay
  razorpay_flutter: ^1.3.6

  # Charts
  fl_chart: ^0.68.0

  # Date & Time
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.1

  # Body diagram (custom canvas)
  # Rendered using CustomPainter — no external package needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/body_diagrams/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf    weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf  weight: 600
        - asset: assets/fonts/Inter-Bold.ttf      weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf weight: 800
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-SemiBold.ttf   weight: 600
        - asset: assets/fonts/Sora-Bold.ttf        weight: 700
        - asset: assets/fonts/Sora-ExtraBold.ttf   weight: 800
